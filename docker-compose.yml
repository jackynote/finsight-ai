services:
  db:
    image: postgres:16-alpine
    container_name: finsight-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finsight}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - finsight_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-finsight}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  finsight_pg_data:
